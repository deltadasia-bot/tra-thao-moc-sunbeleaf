<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <style>
    :root {
      --bg: radial-gradient(circle at 10% 20%, #0a1f1d 0%, #040d0c 90%);
      --card-bg: rgba(13, 27, 24, 0.7);
      --primary: #10b981;
      --text: #f3f4f6;
      --text-muted: #9ca3af;
      --border: rgba(16, 185, 129, 0.2);
    }
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: var(--bg);
      color: var(--text);
      width: 320px;
      margin: 0;
      padding: 16px;
      box-sizing: border-box;
    }
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
      padding-bottom: 12px;
      margin-bottom: 14px;
    }
    h2 {
      margin: 0;
      font-size: 16px;
      color: #ffffff;
      font-weight: 700;
    }
    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--primary);
      box-shadow: 0 0 10px var(--primary);
      display: inline-block;
    }
    .status-dot.error {
      background: #f04438;
      box-shadow: 0 0 10px #f04438;
    }
    .form-group {
      margin-bottom: 12px;
    }
    label {
      display: block;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-muted);
      margin-bottom: 4px;
      font-weight: 600;
    }
    input, select {
      width: 100%;
      background: rgba(2, 4, 3, 0.5);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      padding: 8px 10px;
      font-size: 12.5px;
      box-sizing: border-box;
      outline: none;
      transition: all 0.2s;
    }
    input:focus, select:focus {
      border-color: var(--primary);
      box-shadow: 0 0 8px rgba(16, 185, 129, 0.2);
    }
    .btn-sync {
      background: var(--primary);
      border: none;
      color: white;
      width: 100%;
      padding: 10px;
      border-radius: 8px;
      font-weight: 600;
      font-size: 13px;
      cursor: pointer;
      margin-top: 14px;
      transition: all 0.2s;
      box-shadow: 0 4px 12px rgba(16, 185, 129, 0.2);
    }
    .btn-sync:hover {
      background: #34d399;
      transform: translateY(-1px);
    }
    .btn-save {
      background: rgba(255, 255, 255, 0.08);
      border: none;
      color: var(--text);
      width: 100%;
      padding: 8px;
      border-radius: 8px;
      font-weight: 500;
      font-size: 11.5px;
      cursor: pointer;
      margin-top: 8px;
      transition: all 0.2s;
    }
    .btn-save:hover {
      background: rgba(255, 255, 255, 0.15);
    }
    .log-container {
      margin-top: 16px;
      background: rgba(2, 4, 3, 0.4);
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 10px;
      padding: 10px;
    }
    .log-title {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-muted);
      margin-bottom: 6px;
      text-transform: uppercase;
    }
    .log-list {
      font-family: monospace;
      font-size: 11px;
      max-height: 100px;
      overflow-y: auto;
      margin: 0;
      padding-left: 0;
      list-style: none;
      color: #e5e7eb;
    }
    .log-list li {
      margin-bottom: 4px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.02);
      padding-bottom: 2px;
      word-break: break-all;
    }
  </style>
</head>
<body>
  <div class="header">
    <h2>Sunbeleaf Sapo Assistant</h2>
    <span class="status-dot" id="statusDot"></span>
  </div>

  <div class="form-group">
    <label for="backendUrl">Đường dẫn Backend Zalo</label>
    <input type="text" id="backendUrl" placeholder="https://...">
  </div>

  <div class="form-group">
    <label for="syncInterval">Tần suất đồng bộ</label>
    <select id="syncInterval">
      <option value="10">Mỗi 10 giây</option>
      <option value="15">Mỗi 15 giây (Mặc định)</option>
      <option value="30">Mỗi 30 giây</option>
      <option value="60">Mỗi 1 phút</option>
    </select>
  </div>

  <button class="btn-sync" id="syncBtn">Đồng bộ ngay</button>
  <button class="btn-save" id="pauseBtn" style="margin-top: 8px; background: rgba(239, 68, 68, 0.15); border: 1px solid rgba(239, 68, 68, 0.3); color: #fecaca; display: block;">Tạm dừng đồng bộ đơn</button>
  <button class="btn-save" id="saveBtn">Lưu cấu hình</button>
  <button class="btn-save" id="syncProductsBtn" style="margin-top: 8px; background: #172554; border: 1px solid rgba(59, 130, 246, 0.5); color: #93c5fd; display: block;">Tạo sản phẩm Zalo -> Sapo</button>
  <button class="btn-save" id="updateProductsBtn" style="margin-top: 8px; background: #0f172a; border: 1px solid rgba(16, 185, 129, 0.5); color: #34d399; display: block;">Cập nhật sản phẩm Zalo -> Sapo</button>
  <button class="btn-save" id="btnShowCatalog" style="margin-top: 8px; display: none;">Xem & Copy danh mục Sapo</button>
  <textarea id="txtSapoCatalog" style="width: 100%; height: 120px; margin-top: 8px; display: none; background: rgba(0,0,0,0.5); color: #10b981; border: 1px solid var(--border); border-radius: 6px; font-family: monospace; font-size: 10px; padding: 6px; outline: none; resize: none;" readonly></textarea>

  <div class="log-container">
    <div class="log-title">Nhật ký hoạt động</div>
    <ul class="log-list" id="logList">
      <li>Đang khởi động trợ lý...</li>
    </ul>
  </div>

  <script src="popup.js"></script>
</body>
</html>
